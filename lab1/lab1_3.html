<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ввод числа</title>
</head>
<body>
    <h1>Ввод числа</h1>
    <a href="#" id="getNumberLink">Получить число</a>

    <script>
        'use strict';

        const link = document.getElementById('getNumberLink');
        
        // Абсолютный путь к вашему репозиторию JavaScript на GitHub Pages
        const targetUrl = 'https://sock2408.github.io/javascript/';

        function askForNumber() {
            while (true) {
                let input = prompt("Введите число, большее 100:");
                
                if (input === null) {
                    return false;
                }
                
                let num = Number(input);
                
                if (!isNaN(num) && num > 100) {
                    return true;
                }
            }
        }

        function redirectToIndex() {
            window.location.href = targetUrl;
        }

        link.addEventListener('click', function(event) {
            event.preventDefault();
            
            const success = askForNumber();
            
            if (success) {
                redirectToIndex();
            } else {
                const allow = confirm("Вы не ввели число больше 100. Всё равно перейти?");
                if (allow) {
                    redirectToIndex();
                }
            }
        });
    </script>
</body>
</html>
